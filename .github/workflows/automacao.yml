name: Robo Destinos de Charme

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Copiar os arquivos do repositório
        uses: actions/checkout@v4

      - name: Configurar o Python no servidor
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests

      - name: Executar o Robô de Luxo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOGGER_ACCESS_TOKEN: ${{ secrets.BLOGGER_ACCESS_TOKEN }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
        run: python robo_luxo.py
