name: Robo Destinos de Charme

on:
  schedule:
    # Programado para rodar todos os dias às 09:00 da manhã (Horário de Brasília)
    - cron: '0 12 * * *'
  workflow_dispatch: # Permite que você clique num botão para testar o robô na hora que quiser

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
    - name: Copiar os arquivos do repositório
      uses: actions/checkout@v3

    - name: Configurar o Python no servidor
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar a inteligência artificial do Google
      run: |
        python -m pip install --upgrade pip
        pip install google-genai

    - name: Executar o Robô de Luxo
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        BLOGGER_ACCESS_TOKEN: ${{ secrets.BLOGGER_ACCESS_TOKEN }}
      run: python robo_luxo.py
