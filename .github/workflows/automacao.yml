name: Robo Destinos de Charme

on:
  schedule:
    - cron: '0 12 * * *' # Roda todo dia às 09:00 da manhã
  workflow_dispatch: # Botão para testar na hora

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
    - name: Copiar os arquivos do repositório
      uses: actions/checkout@v3

    - name: Configurar o Python no servidor
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar a inteligência artificial do Google
      run: |
        python -m pip install --upgrade pip
        pip install google-genai

    - name: Executar o Robô de Luxo
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
        SENHA_REMETENTE: ${{ secrets.SENHA_REMETENTE }}
      run: python robo_luxo.py
